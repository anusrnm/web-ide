<!DOCTYPE html>
<html>
<head>
<title>Web IDE</title>
<link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">

<script src="https://unpkg.com/monaco-editor@0.55.1/min/vs/loader.js"></script>

<style>
* { box-sizing:border-box; }

html, body {
    margin:0;
    height:100%;
    overflow:hidden;
    font-family:Segoe UI, Roboto, Arial, sans-serif;
    background:#1e1e1e;
    color:#d4d4d4;
}

body { display:flex; }

#explorer {
    width:280px;
    min-width:180px;
    max-width:600px;
    background:#181818;
    color:#cfcfcf;
    border-right:1px solid #2f2f2f;
    overflow:hidden;
    padding:10px;
    display:flex;
    flex-direction:column;
    gap:8px;
}

#divider {
    width:6px;
    cursor:col-resize;
    background:#252525;
}

#main {
    flex:1;
    display:flex;
    flex-direction:column;
    min-width:0;
    min-height:0;
    overflow:hidden;
}

#tabs {
    display:flex;
    background:#252526;
    border-bottom:1px solid #333;
    overflow-x:auto;
    overflow-y:hidden;
    white-space:nowrap;
    min-height:34px;
    flex-shrink:0;
}

.tab {
    padding:7px 10px;
    border-right:1px solid #343434;
    cursor:pointer;
    color:#c9c9c9;
    display:inline-flex;
    align-items:center;
    gap:8px;
    max-width:260px;
    min-width:110px;
    font-size:12px;
}

.tab-label {
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
}

.pin-icon {
    width:14px;
    height:14px;
    cursor:pointer;
    flex-shrink:0;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    color:#888;
    font-size:11px;
    opacity:0;
    transition:opacity 0.2s;
}

.tab:hover .pin-icon {
    opacity:1;
}

.pin-icon.pinned {
    opacity:1;
    color:#4fc1ff;
}

.pin-icon:hover { color:#fff; }

#explorer.hidden {
    display:none;
}

#divider.explorer-hidden {
    cursor:default;
    opacity:0.5;
}

.toggle-explorer-btn {
    cursor:pointer;
    width:14px;
    height:14px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    color:#7fb3ff;
    font-size:10px;
    margin-right:4px;
}

.toggle-explorer-btn:hover { color:#fff; }

.tab:hover { background:#2d2d30; }

.tab.active {
    background:#1e1e1e;
    color:#ffffff;
}

.tab.dirty .tab-label::after {
    content:" •";
    color:#4fc1ff;
}

.close {
    color:#d0d0d0;
    cursor:pointer;
    font-size:13px;
}

.close:hover { color:#ff7b72; }

#editor {
    flex:1;
    min-height:0;
}

#statusbar {
    height:22px;
    background:#007acc;
    color:white;
    font-size:11px;
    padding:0 10px;
    display:flex;
    align-items:center;
    line-height:22px;
    flex-shrink:0;
    overflow:hidden;
    white-space:nowrap;
    text-overflow:ellipsis;
    border-top:1px solid rgba(255,255,255,0.16);
}

.explorer-title {
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.08em;
    color:#9d9d9d;
    margin:0;
}

.toolbar {
    display:flex;
    gap:8px;
    margin:0;
}

.icon-btn {
    cursor:pointer;
    width:28px;
    height:28px;
    border-radius:6px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#232323;
    border:1px solid #333;
    color:#dadada;
}

.icon-btn:hover { background:#2d2d2d; }

.icon-btn svg {
    width:16px;
    height:16px;
}

#search {
    width:100%;
    margin:0;
    border:1px solid #3d3d3d;
    background:#111;
    color:#e5e5e5;
    border-radius:6px;
    padding:6px 8px;
    outline:none;
    font-size:12px;
}

#search:focus {
    border-color:#007acc;
}

#tree {
    flex:1;
    overflow:auto;
    min-height:0;
    padding-right:4px;
}

#tree ul {
    list-style:none;
    margin:0;
    padding-left:14px;
}

#tree > ul { padding-left:0; }

.tree-item {
    cursor:pointer;
    user-select:none;
    padding:4px 8px;
    border-radius:6px;
    display:flex;
    align-items:center;
    gap:6px;
    font-size:12px;
}

.tree-item:hover { background:#2a2a2a; }

.tree-item.selected {
    background:#094771;
    color:#ffffff;
}

.tree-caret {
    color:#a7a7a7;
    width:12px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
}

.tree-icon {
    width:14px;
    height:14px;
    display:inline-flex;
    flex-shrink:0;
}

.tree-label {
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
}

.tree-item.folder .tree-icon svg { color:#dcb67a; }
.tree-item.file .tree-icon svg { color:#7fb3ff; }

.tree-item.selected .tree-caret,
.tree-item.selected .tree-icon svg { color:#ffffff; }

.context-menu {
    position:fixed;
    z-index:2000;
    display:none;
    min-width:170px;
    background:#252526;
    border:1px solid #3a3a3a;
    border-radius:6px;
    box-shadow:0 8px 24px rgba(0,0,0,.35);
    padding:4px;
}

.context-item {
    width:100%;
    border:none;
    background:transparent;
    color:#d4d4d4;
    text-align:left;
    font-size:12px;
    padding:6px 8px;
    border-radius:4px;
    cursor:pointer;
}

.context-item:hover {
    background:#094771;
    color:#ffffff;
}

.context-separator {
    height:1px;
    background:#3a3a3a;
    margin:4px 2px;
}

.inline-input {
    border:1px solid #007acc;
    background:#111;
    color:#e5e5e5;
    border-radius:4px;
    padding:3px 6px;
    font-size:12px;
    outline:none;
    font-family:Segoe UI, Roboto, Arial, sans-serif;
}

#command-palette {
    position:fixed;
    z-index:3000;
    display:none;
    top:0;
    left:0;
    right:0;
    bottom:0;
    background:rgba(0,0,0,0.6);
    align-items:flex-start;
    justify-content:center;
    padding-top:10vh;
}

.palette-box {
    min-width:500px;
    max-width:600px;
    background:#252526;
    border:1px solid #3a3a3a;
    border-radius:8px;
    box-shadow:0 16px 32px rgba(0,0,0,.5);
    overflow:hidden;
    max-height:70vh;
    display:flex;
    flex-direction:column;
}

.palette-input {
    padding:10px 12px;
    border:none;
    background:#1e1e1e;
    color:#e5e5e5;
    font-size:13px;
    outline:none;
    border-bottom:1px solid #3a3a3a;
    font-family:Segoe UI, Roboto, Arial, sans-serif;
}

.palette-items {
    flex:1;
    overflow-y:auto;
    min-height:0;
}

.palette-item {
    padding:7px 12px;
    cursor:pointer;
    color:#d4d4d4;
    font-size:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.palette-item:hover,
.palette-item.highlighted {
    background:#094771;
    color:#ffffff;
}

.palette-hint {
    color:#888;
    font-size:11px;
}
</style>
</head>
<body>

<div id="explorer">
    <p class="explorer-title">Explorer</p>
    <div class="toolbar">
        <button class="icon-btn" id="new-file-btn" onclick="createItem('file')" title="New File" aria-label="New File"></button>
        <button class="icon-btn" id="new-folder-btn" onclick="createItem('folder')" title="New Folder" aria-label="New Folder"></button>
        <button class="icon-btn" id="logout-btn" onclick="logout()" title="Logout" aria-label="Logout">⎋</button>
    </div>
    <input id="search" placeholder="Search files...">
    <div id="tree"></div>
</div>

<div id="divider"></div>

<div id="main">
    <div id="tabs"></div>
    <div id="editor"></div>
    <div id="statusbar">Ready</div>
</div>

<div id="explorer-context-menu" class="context-menu"></div>

<div id="command-palette">
    <div class="palette-box">
        <input id="palette-input" class="palette-input" type="text" placeholder="Type command name...">
        <div id="palette-items" class="palette-items"></div>
    </div>
</div>

<script>
require.config({
    paths:{'vs':'https://unpkg.com/monaco-editor@0.55.1/min/vs'}
});

let editor;
let diffEditor;
let models = {};
let modelListeners = {};
let dirtyFiles = {};
let currentFile = null;
let compareMode = false;
let compareCandidatePath = null;
let compareOriginalPath = null;
let compareModifiedPath = null;
let compareReadOnlyModels = {};
let selectedTreePath = null;
let menuTarget = null;
let closedTabs = [];
let recentFiles = [];
let inlineEditState = null;
let pendingInlineEdit = false;
let pinnedTabs = {};
let explorerHidden = false;

const MAX_RECENT = 12;
const STORAGE_KEY = "ide_recentFiles";

function loadRecentFiles(){
    try {
        const stored = localStorage.getItem(STORAGE_KEY);
        recentFiles = stored ? JSON.parse(stored) : [];
    } catch {
        recentFiles = [];
    }
}

function saveRecentFiles(){
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(recentFiles.slice(0, MAX_RECENT)));
    } catch {}
}

function addRecentFile(path){
    path = normalizePath(path);
    recentFiles = recentFiles.filter(p => p !== path);
    recentFiles.unshift(path);
    if(recentFiles.length > MAX_RECENT) recentFiles.pop();
    saveRecentFiles();
}

function removeRecentFile(path){
    path = normalizePath(path);
    recentFiles = recentFiles.filter(p => p !== path);
    saveRecentFiles();
}

function createIcon(name){
    const ns = "http://www.w3.org/2000/svg";
    const svg = document.createElementNS(ns, "svg");
    svg.setAttribute("viewBox", "0 0 16 16");
    svg.setAttribute("width", "16");
    svg.setAttribute("height", "16");
    svg.setAttribute("fill", "currentColor");

    const addPath = (d) => {
        const path = document.createElementNS(ns, "path");
        path.setAttribute("d", d);
        path.setAttribute("fill", "currentColor");
        svg.appendChild(path);
    };

    if(name === "file"){
        addPath("M2 2h8v3h4v9H2V2zm2 10h8V7h-3V4H4v8z");
    } else if(name === "folder"){
        addPath("M2 3h4l2 2h6v8H2V3z");
    } else if(name === "filePlus"){
        addPath("M2 2h8v3h4v9H2V2zm5 6v2h2v1H7v2h-1v-2H4v-1h2V8h1z");
    } else if(name === "folderPlus"){
        addPath("M2 3h4l2 2h6v8H2V3zm6 3v2h2v1H8v2H7v-2H5v-1h2V6h1z");
    } else if(name === "chevronRight"){
        addPath("M5.5 3L10 8l-4.5 5V10zm3 5l-3-4.5v9L8.5 8z");
    } else if(name === "chevronDown"){
        addPath("M13 5.5l-5 4.5-5-4.5v3l5 4.5 5-4.5v-3z");
    }

    return svg;
}

function setIcon(container, iconName){
    container.innerHTML = "";
    container.appendChild(createIcon(iconName));
}

function initToolbarIcons(){
    const newFile = document.getElementById("new-file-btn");
    const newFolder = document.getElementById("new-folder-btn");
    if(newFile) setIcon(newFile, "filePlus");
    if(newFolder) setIcon(newFolder, "folderPlus");
}

function initContextMenu(){
    document.addEventListener("click", hideContextMenu);
    document.addEventListener("keydown", (event)=>{
        if(event.key === "Escape") hideContextMenu();
    });

    const tree = document.getElementById("tree");
    tree.addEventListener("contextmenu", (event)=>{
        const item = event.target.closest(".tree-item");
        if(item) return;
        event.preventDefault();
        openContextMenu(event.clientX, event.clientY, { type: "root", path: "" });
    });
}

async function resolveModelForCompare(path){
    path = normalizePath(path);
    
    if(models[path]){
        return { model: models[path], isReadOnly: false };
    }
    
    try {
        const data = await requestJson("/open",{
            method:"POST",
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({path})
        });
        
        const model = monaco.editor.createModel(
            data.content,
            detectLanguage(path)
        );
        compareReadOnlyModels[path] = model;
        return { model: model, isReadOnly: true };
    } catch (error) {
        throw error;
    }
}

function exitCompareMode(){
    if(!compareMode) return;
    
    if(diffEditor){
        diffEditor.dispose();
        diffEditor = null;
    }
    
    Object.keys(compareReadOnlyModels).forEach(path => {
        const model = compareReadOnlyModels[path];
        if(model) model.dispose();
    });
    compareReadOnlyModels = {};
    
    compareMode = false;
    compareCandidatePath = null;
    compareOriginalPath = null;
    compareModifiedPath = null;
    
    const editorContainer = document.getElementById('editor');
    editorContainer.innerHTML = '';
    editor = monaco.editor.create(editorContainer, {
        theme:'vs-dark',
        automaticLayout:true
    });
    editor.onDidChangeCursorPosition(updateStatus);
    
    if(currentFile && models[currentFile]){
        editor.setModel(models[currentFile]);
    }
    
    setStatus('Compare mode exited');
}

async function startCompare(originalPath, modifiedPath){
    try {
        originalPath = normalizePath(originalPath);
        modifiedPath = normalizePath(modifiedPath);
        
        const origData = await resolveModelForCompare(originalPath);
        const modData = await resolveModelForCompare(modifiedPath);
        
        if(diffEditor) diffEditor.dispose();
        
        const editorContainer = document.getElementById('editor');
        editorContainer.innerHTML = '';
        
        diffEditor = monaco.editor.createDiffEditor(editorContainer, {
            theme:'vs-dark',
            automaticLayout:true,
            readOnly:false,
            originalEditable:false
        });
        
        diffEditor.setModel({
            original: origData.model,
            modified: modData.model
        });
        
        compareMode = true;
        compareOriginalPath = originalPath;
        compareModifiedPath = modifiedPath;
        currentFile = null;
        
        setStatus(`Comparing: ${basename(originalPath)} ↔ ${basename(modifiedPath)}`);
    } catch (error) {
        setStatus(`Compare failed: ${error.message}`, true);
        exitCompareMode();
    }
}

require(['vs/editor/editor.main'], function(){
    editor = monaco.editor.create(document.getElementById('editor'), {
        theme:'vs-dark',
        automaticLayout:true
    });

    editor.onDidChangeCursorPosition(updateStatus);

    window.addEventListener("keydown", e=>{
        if(e.ctrlKey && e.key==="s"){
            e.preventDefault();
            save();
        }
    });

    loadTree();
});

initToolbarIcons();
initContextMenu();

function buildCommandRegistry(){
    const baseActions = {
        newFile: async ()=> createItem("file"),
        newFolder: async ()=> createItem("folder"),
        saveFile: async ()=> save(),
        saveAll: async ()=> {
            for(const path of Object.keys(models)){
                if(dirtyFiles[path]){
                    currentFile = path;
                    await save();
                }
            }
            setStatus("All files saved");
        },
        reopenClosedTab: async ()=> {
            if(closedTabs.length){
                const path = closedTabs.pop();
                await openFile(path);
            }
        },
        openRecent: async ()=> {
            if(!recentFiles.length){
                setStatus("No recent files");
                return;
            }
            showRecentPalette();
        },
        undo: async ()=> {
            if(editor && editor.hasTextFocus()) editor.trigger('keyboard', 'undo');
        },
        redo: async ()=> {
            if(editor && editor.hasTextFocus()) editor.trigger('keyboard', 'redo');
        },
        selectForCompare: async ()=> {
            if(!currentFile){
                setStatus("No file open to select for compare", true);
                return;
            }
            compareCandidatePath = currentFile;
            setStatus(`Selected for compare: ${basename(currentFile)}`);
        },
        compareWithSelected: async ()=> {
            if(!compareCandidatePath){
                setStatus("No file selected for compare", true);
                return;
            }
            if(!currentFile){
                setStatus("No file open to compare", true);
                return;
            }
            await startCompare(compareCandidatePath, currentFile);
        },
        exitCompare: async ()=> {
            if(!compareMode){
                setStatus("Not in compare mode", true);
                return;
            }
            exitCompareMode();
        }
    };

    const commands = [
        { id: "newFile", label: "New File", action: baseActions.newFile, keys: "" },
        { id: "newFolder", label: "New Folder", action: baseActions.newFolder, keys: "" },
        { id: "saveFile", label: "Save File", action: baseActions.saveFile, keys: "Ctrl+S" },
        { id: "saveAll", label: "Save All", action: baseActions.saveAll, keys: "Ctrl+Shift+S" },
        { id: "reopenClosedTab", label: "Reopen Closed Tab", action: baseActions.reopenClosedTab, keys: "Ctrl+Shift+T" },
        { id: "openRecent", label: "Open Recent File", action: baseActions.openRecent, keys: "" },
        { id: "undo", label: "Undo", action: baseActions.undo, keys: "Ctrl+Z" },
        { id: "redo", label: "Redo", action: baseActions.redo, keys: "Ctrl+Shift+Z" },
        { id: "selectForCompare", label: "Select File for Compare", action: baseActions.selectForCompare, keys: "" },
        { id: "compareWithSelected", label: "Compare with Selected File", action: baseActions.compareWithSelected, keys: "" },
        { id: "exitCompare", label: "Exit Compare Mode", action: baseActions.exitCompare, keys: "" }
    ];

    return { commands, actions: baseActions };
}

const commandRegistry = buildCommandRegistry();

function showCommandPalette(){
    const palette = document.getElementById("command-palette");
    const input = document.getElementById("palette-input");
    const items = document.getElementById("palette-items");

    palette.style.display = "flex";
    input.value = "";
    input.focus();
    populatePaletteItems(commandRegistry.commands, items);
}

function hideCommandPalette(){
    document.getElementById("command-palette").style.display = "none";
}

function populatePaletteItems(commands, container, filter=""){
    container.innerHTML = "";
    const filtered = filter
        ? commands.filter(cmd => cmd.label.toLowerCase().includes(filter.toLowerCase()))
        : commands;

    for(const cmd of filtered){
        const item = document.createElement("div");
        item.className = "palette-item";
        item.dataset.id = cmd.id;

        const label = document.createElement("span");
        label.textContent = cmd.label;

        const hint = document.createElement("span");
        hint.className = "palette-hint";
        hint.textContent = cmd.keys || "";

        item.appendChild(label);
        item.appendChild(hint);

        item.onclick = async ()=>{
            const action = commandRegistry.commands.find(c => c.id === cmd.id)?.action;
            if(action){
                hideCommandPalette();
                await action();
            }
        };

        container.appendChild(item);
    }

    if(!filtered.length){
        const msg = document.createElement("div");
        msg.style.cssText = "padding:12px;color:#888;text-align:center;";
        msg.textContent = "No commands found";
        container.appendChild(msg);
    }
}

function showRecentPalette(){
    const palette = document.getElementById("command-palette");
    const input = document.getElementById("palette-input");
    const items = document.getElementById("palette-items");

    palette.style.display = "flex";
    input.value = "(recent files)";
    input.focus();

    items.innerHTML = "";
    if(!recentFiles.length){
        const msg = document.createElement("div");
        msg.style.cssText = "padding:12px;color:#888;";
        msg.textContent = "No recent files";
        items.appendChild(msg);
        return;
    }

    for(const path of recentFiles){
        const item = document.createElement("div");
        item.className = "palette-item";
        item.textContent = path;
        item.onclick = async ()=>{
            hideCommandPalette();
            await openFile(path);
        };
        items.appendChild(item);
    }
}

function basename(path){
    return path.split('/').pop() || path;
}

function dirname(path){
    const idx = path.lastIndexOf('/');
    return idx === -1 ? "" : path.slice(0, idx);
}

function joinPath(parent, name){
    return parent ? `${parent}/${name}` : name;
}

function getTabElement(path){
    return Array.from(document.querySelectorAll(".tab"))
        .find(t => t.dataset.path === path) || null;
}

function setStatus(message, isError=false){
    const status = document.getElementById("statusbar");
    status.innerText = message;
    status.style.background = isError ? "#b42318" : "#007acc";
}

function normalizePath(path){
    return String(path || "").replace(/\\/g, '/');
}

function setTreeSelection(path){
    selectedTreePath = normalizePath(path);
    document.querySelectorAll(".tree-item").forEach((el)=>{
        el.classList.toggle("selected", normalizePath(el.dataset.path) === selectedTreePath);
    });
}

function cancelInlineEdit(){
    if(!inlineEditState) return;
    const input = inlineEditState.input;
    const originalName = inlineEditState.originalName;
    const container = inlineEditState.container;
    const isRoot = inlineEditState.isRoot;

    input.remove();
    inlineEditState = null;
    pendingInlineEdit = false;

    if(isRoot){
        // Remove root-level placeholder
        if(container.parentNode) container.parentNode.removeChild(container);
    } else {
        // Restore label for tree item
        const label = document.createElement("span");
        label.className = "tree-label";
        label.textContent = originalName;
        container.appendChild(label);
    }
}

function startInlineEdit(nodePath, operationType="rename"){
    if(inlineEditState) cancelInlineEdit();

    let node = null;

    // For root level create, show inline input at top of tree
    if(nodePath === "" && operationType !== "rename"){
        const tree = document.getElementById("tree");
        const placeholder = document.createElement("div");
        placeholder.style.cssText = "padding:4px 8px;margin-bottom:4px;";
        
        const input = document.createElement("input");
        input.className = "inline-input";
        input.type = "text";
        input.placeholder = `New ${operationType} name...`;
        input.spellcheck = false;
        
        placeholder.appendChild(input);
        tree.insertBefore(placeholder, tree.firstChild);
        
        inlineEditState = {
            nodePath,
            operationType,
            originalName: "",
            input,
            container: placeholder,
            isRoot: true
        };
        
        input.focus();
        pendingInlineEdit = true;
        
        async function commitEdit(newValue){
            if(!newValue){
                cancelInlineEdit();
                return;
            }
            input.disabled = true;
            try {
                await createItemWithPath(operationType, normalizePath(newValue));
            } finally {
                input.disabled = false;
                cancelInlineEdit();
            }
        }
        
        input.addEventListener("blur", ()=> commitEdit(input.value));
        input.addEventListener("keydown", (event)=>{
            if(event.key === "Enter"){
                event.stopPropagation();
                commitEdit(input.value);
            } else if(event.key === "Escape"){
                event.stopPropagation();
                cancelInlineEdit();
            }
        });
        return;
    }

    node = document.querySelector(`.tree-item[data-path="${nodePath}"]`);
    if(!node) return;

    const label = node.querySelector(".tree-label");
    if(!label) return;

    const originalName = label.textContent;
    label.remove();

    const input = document.createElement("input");
    input.className = "inline-input";
    input.type = "text";
    input.value = operationType === "rename" ? originalName : "";
    input.spellcheck = false;

    inlineEditState = {
        nodePath,
        operationType,
        originalName,
        input,
        container: node
    };

    node.appendChild(input);
    input.focus();
    if(operationType === "rename") input.select();
    pendingInlineEdit = true;

    async function commitEdit(newValue){
        if(!newValue || (operationType === "rename" && newValue === originalName)){
            cancelInlineEdit();
            return;
        }

        input.disabled = true;
        try {
            if(operationType === "rename"){
                await renamePath(nodePath, newValue);
            } else {
                const targetPath = normalizePath(joinPath(nodePath, newValue));
                await createItemWithPath(operationType, targetPath);
            }
        } finally {
            input.disabled = false;
            cancelInlineEdit();
        }
    }

    input.addEventListener("blur", ()=> commitEdit(input.value));
    input.addEventListener("keydown", (event)=>{
        if(event.key === "Enter"){
            event.stopPropagation();
            commitEdit(input.value);
        } else if(event.key === "Escape"){
            event.stopPropagation();
            cancelInlineEdit();
        }
    });
}

function hideContextMenu(){
    const menu = document.getElementById("explorer-context-menu");
    menu.style.display = "none";
    menu.innerHTML = "";
    menuTarget = null;
}

function getContextActions(target){
    if(target.type === "file"){
        return [
            { label: "Open", action: ()=>openFile(target.path) },
            { type: "separator" },
            { label: "Select for Compare", action: ()=>{
                compareCandidatePath = normalizePath(target.path);
                setStatus(`Selected for compare: ${basename(compareCandidatePath)}`);
                hideContextMenu();
            }},
            { label: "Compare with Selected", action: async ()=>{
                if(!compareCandidatePath){
                    setStatus("No file selected for compare", true);
                    return;
                }
                hideContextMenu();
                await startCompare(compareCandidatePath, target.path);
            }},
            { type: "separator" },
            { label: "Rename", action: ()=>startInlineEdit(target.path, "rename") },
            { label: "Delete", action: ()=>deletePath(target.path) }
        ];
    }

    if(target.type === "folder"){
        return [
            { label: "New File", action: ()=>startInlineEdit(target.path, "file") },
            { label: "New Folder", action: ()=>startInlineEdit(target.path, "folder") },
            { type: "separator" },
            { label: "Rename", action: ()=>startInlineEdit(target.path, "rename") },
            { label: "Delete", action: ()=>deletePath(target.path) }
        ];
    }

    return [
        { label: "New File", action: ()=>startInlineEdit("", "file") },
        { label: "New Folder", action: ()=>startInlineEdit("", "folder") },
        { type: "separator" },
        { label: "Refresh Explorer", action: ()=>loadTree() }
    ];
}

function openContextMenu(x, y, target){
    menuTarget = target;
    const menu = document.getElementById("explorer-context-menu");
    menu.innerHTML = "";

    for(const item of getContextActions(target)){
        if(item.type === "separator"){
            const separator = document.createElement("div");
            separator.className = "context-separator";
            menu.appendChild(separator);
            continue;
        }

        const button = document.createElement("button");
        button.className = "context-item";
        button.type = "button";
        button.textContent = item.label;
        button.onclick = async (event)=>{
            event.stopPropagation();
            hideContextMenu();
            await item.action();
        };
        menu.appendChild(button);
    }

    menu.style.display = "block";
    const { innerWidth, innerHeight } = window;
    const rect = menu.getBoundingClientRect();
    const left = Math.min(x, innerWidth - rect.width - 6);
    const top = Math.min(y, innerHeight - rect.height - 6);
    menu.style.left = `${Math.max(6, left)}px`;
    menu.style.top = `${Math.max(6, top)}px`;
}

async function requestJson(url, options={}){
    const response = await fetch(url, options);
    let data = {};
    try {
        data = await response.json();
    } catch {
        data = {};
    }

    if(!response.ok){
        if(response.status === 401){
            window.location.href = "/login";
            throw new Error("Authentication required");
        }
        const message = data.error || `Request failed (${response.status})`;
        throw new Error(message);
    }

    return data;
}

function detectLanguage(file){
    const ext = file.split('.').pop().toLowerCase();
    const map = {
        py:"python",
        js:"javascript",
        ts:"typescript",
        html:"html",
        css:"css",
        json:"json",
        md:"markdown",
        cpp:"cpp",
        c:"c",
        java:"java",
        go:"go",
        rs:"rust",
        php:"php",
        sh:"shell",
        yml:"yaml",
        yaml:"yaml"
    };
    return map[ext] || "plaintext";
}

async function loadTree(){
    try {
        const data = await requestJson("/tree");
        const tree = document.getElementById("tree");
        tree.innerHTML = "";
        tree.appendChild(buildTree(data));
        if(selectedTreePath){
            setTreeSelection(selectedTreePath);
        }
    } catch (error) {
        setStatus(`Tree error: ${error.message}`, true);
    }
}

function buildTree(nodes){
    const list = document.createElement("ul");

    for(let n of nodes){
        const item = document.createElement("li");
        const node = document.createElement("div");
        node.className = `tree-item ${n.type === "folder" ? "folder closed" : "file"}`;
        node.dataset.path = n.path;

        const caret = document.createElement("span");
        caret.className = "tree-caret";

        const icon = document.createElement("span");
        icon.className = "tree-icon";

        const label = document.createElement("span");
        label.className = "tree-label";
        label.textContent = n.name;

        if(n.type === "folder"){
            setIcon(caret, "chevronRight");
            setIcon(icon, "folder");
        } else {
            setIcon(icon, "file");
        }

        node.appendChild(caret);
        node.appendChild(icon);
        node.appendChild(label);

        if(n.type === "folder"){
            const childrenContainer = document.createElement("div");
            childrenContainer.style.display = "none";
            childrenContainer.style.marginLeft = "8px";
            childrenContainer.appendChild(buildTree(n.children || []));

            node.onclick = function(){
                setTreeSelection(this.dataset.path);
                const isClosed = this.classList.contains("closed");
                this.classList.toggle("closed");
                childrenContainer.style.display = isClosed ? "block" : "none";
                setIcon(caret, isClosed ? "chevronDown" : "chevronRight");
            };

            node.oncontextmenu = function(event){
                event.preventDefault();
                setTreeSelection(this.dataset.path);
                openContextMenu(event.clientX, event.clientY, {
                    type: "folder",
                    path: this.dataset.path
                });
            };

            item.appendChild(node);
            item.appendChild(childrenContainer);
        } else {
            node.onclick = function(){
                setTreeSelection(this.dataset.path);
                openFile(this.dataset.path);
            };

            node.oncontextmenu = function(event){
                event.preventDefault();
                setTreeSelection(this.dataset.path);
                openContextMenu(event.clientX, event.clientY, {
                    type: "file",
                    path: this.dataset.path
                });
            };

            item.appendChild(node);
        }

        list.appendChild(item);
    }

    return list;
}

async function openFile(path){
    path = normalizePath(path);

    if(models[path]){
        setActive(path);
        return;
    }

    try {
        const data = await requestJson("/open",{
            method:"POST",
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({path})
        });

        models[path] = monaco.editor.createModel(
            data.content,
            detectLanguage(path)
        );

        modelListeners[path] = models[path].onDidChangeContent(()=>{
            dirtyFiles[path] = true;
            updateTabState(path);
        });

        dirtyFiles[path] = false;
        createTab(path);
        setActive(path);
        addRecentFile(path);
    } catch (error) {
        setStatus(`Open failed: ${error.message}`, true);
    }
}

function createTab(path){
    const tab = document.createElement("div");
    tab.className = "tab";
    tab.dataset.path = path;

    const label = document.createElement("span");
    label.className = "tab-label";
    label.textContent = basename(path);

    const pinIcon = document.createElement("span");
    pinIcon.className = "pin-icon";
    pinIcon.innerHTML = "📌";
    pinIcon.title = "Pin tab";
    pinIcon.onclick = (e) => {
        e.stopPropagation();
        togglePinTab(path);
    };

    const close = document.createElement("span");
    close.className = "close";
    close.textContent = "×";

    tab.appendChild(label);
    tab.appendChild(pinIcon);
    tab.appendChild(close);

    tab.onclick = () => setActive(path);

    close.onclick = (e) => {
        e.stopPropagation();
        closeTab(path);
    };

    document.getElementById("tabs").appendChild(tab);
    updateTabState(path);
}

function setActive(path){
    if(!models[path]) return;

    currentFile = path;
    editor.setModel(models[path]);
    setTreeSelection(path);

    document.querySelectorAll(".tab").forEach(t=>{
        t.classList.toggle("active", t.dataset.path===path);
    });

    updateStatus();
}

function closeTab(path, force=false){
    if(!models[path]) return;

    if(!force && dirtyFiles[path]){
        const shouldClose = confirm(`Close without saving ${basename(path)}?`);
        if(!shouldClose) return;
    }

    if(modelListeners[path]){
        modelListeners[path].dispose();
        delete modelListeners[path];
    }

    models[path].dispose();
    delete models[path];
    delete dirtyFiles[path];
    delete pinnedTabs[path];

    const tab = getTabElement(path);
    if(tab) tab.remove();

    closedTabs.push(path);
    if(closedTabs.length > 20) closedTabs.shift();

    if(compareMode && (path === compareOriginalPath || path === compareModifiedPath)){
        exitCompareMode();
    }

    if(currentFile === path){
        const remainingTabs = Array.from(document.querySelectorAll(".tab"));
        if(remainingTabs.length){
            setActive(remainingTabs[remainingTabs.length - 1].dataset.path);
        } else {
            if(compareMode) exitCompareMode();
            editor.setModel(null);
            currentFile = null;
            setStatus("Ready");
        }
    }
}

function updateTabState(path){
    const tab = getTabElement(path);
    if(!tab) return;
    tab.classList.toggle("dirty", !!dirtyFiles[path]);
    const pinIcon = tab.querySelector(".pin-icon");
    if(pinIcon) pinIcon.classList.toggle("pinned", !!pinnedTabs[path]);
}

function togglePinTab(path){
    pinnedTabs[path] = !pinnedTabs[path];
    updateTabState(path);
    reorganizeTabs();
}

function reorganizeTabs(){
    const tabs = document.getElementById("tabs");
    const tabEls = Array.from(tabs.querySelectorAll(".tab"));
    const pinned = tabEls.filter(t => pinnedTabs[t.dataset.path]);
    const unpinned = tabEls.filter(t => !pinnedTabs[t.dataset.path]);
    
    tabs.innerHTML = "";
    pinned.forEach(t => tabs.appendChild(t));
    unpinned.forEach(t => tabs.appendChild(t));
}

async function save(){
    if(!currentFile) return;

    try {
        await requestJson("/save",{
            method:"POST",
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
                path:currentFile,
                content:editor.getValue()
            })
        });

        dirtyFiles[currentFile] = false;
        updateTabState(currentFile);
        updateStatus();
    } catch (error) {
        setStatus(`Save failed: ${error.message}`, true);
    }
}

async function logout(){
    try {
        await requestJson("/auth/logout", {
            method: "POST",
            headers: { 'Content-Type': 'application/json' }
        });
    } catch {}
    window.location.href = "/login";
}

function updateStatus(){
    if(!currentFile){
        setStatus("Ready");
        return;
    }

    const p = editor.getPosition();
    const dirty = dirtyFiles[currentFile] ? " (Unsaved)" : "";
    setStatus(`${currentFile}${dirty} | Ln ${p.lineNumber}, Col ${p.column}`);
}

function syncRenamedFileInTabs(oldPath, newPath){
    const oldPrefix = `${oldPath}/`;
    const openPaths = Object.keys(models).filter((key)=>
        key === oldPath || key.startsWith(oldPrefix)
    );

    for(const sourcePath of openPaths){
        const targetPath = sourcePath === oldPath
            ? newPath
            : `${newPath}${sourcePath.slice(oldPath.length)}`;

        models[targetPath] = models[sourcePath];
        delete models[sourcePath];

        if(modelListeners[sourcePath]){
            modelListeners[targetPath] = modelListeners[sourcePath];
            delete modelListeners[sourcePath];
        }

        dirtyFiles[targetPath] = dirtyFiles[sourcePath];
        delete dirtyFiles[sourcePath];

        const tab = getTabElement(sourcePath);
        if(tab){
            tab.dataset.path = targetPath;
            const label = tab.querySelector(".tab-label");
            if(label) label.textContent = basename(targetPath);
        }

        if(currentFile === sourcePath){
            currentFile = targetPath;
        }
    }
}

async function createItem(type, basePath=""){
    // If basePath not provided, use selected tree item or root
    if(!basePath){
        if(selectedTreePath){
            const selected = document.querySelector(`.tree-item[data-path="${selectedTreePath}"]`);
            if(selected && selected.classList.contains("folder")){
                basePath = selectedTreePath;
            } else if(selectedTreePath){
                basePath = dirname(selectedTreePath);
            }
        }
    }
    await startInlineEdit(basePath, type);
}

async function createItemWithPath(type, targetPath){
    if(!targetPath){
        setStatus("Invalid path", true);
        return;
    }

    try {
        await requestJson("/create",{
            method:"POST",
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
                path:targetPath,
                type:type
            })
        });
        await loadTree();
        setTreeSelection(normalizePath(targetPath));
    } catch (error) {
        setStatus(`Create failed: ${error.message}`, true);
    }
}

async function renamePath(path, newName){
    if(!newName) return;

    const target = normalizePath(joinPath(dirname(path), newName));

    try {
        await requestJson("/rename",{
            method:"POST",
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
                old:normalizePath(path),
                new:target
            })
        });

        if(compareMode && (normalizePath(path) === compareOriginalPath || normalizePath(path) === compareModifiedPath)){
            exitCompareMode();
        }

        syncRenamedFileInTabs(normalizePath(path), target);
        await loadTree();
        setTreeSelection(target);
    } catch (error) {
        setStatus(`Rename failed: ${error.message}`, true);
    }
}

async function deletePath(path){
    const confirmed = confirm(`Delete ${basename(path)}?`);
    if(!confirmed) return;

    try {
        await requestJson("/delete",{
            method:"POST",
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({path:normalizePath(path)})
        });

        const targetPrefix = `${path}/`;
        const affectedTabs = Object.keys(models).filter((key)=>
            key === path || key.startsWith(targetPrefix)
        );

        for(const tabPath of affectedTabs){
            closeTab(tabPath, true);
        }

        if(compareMode && (normalizePath(path) === compareOriginalPath || normalizePath(path) === compareModifiedPath)){
            exitCompareMode();
        }

        await loadTree();
        selectedTreePath = null;
    } catch (error) {
        setStatus(`Delete failed: ${error.message}`, true);
    }
}

document.getElementById("search").addEventListener("input", function(){
    const query = this.value.toLowerCase();
    document.querySelectorAll(".file").forEach(el=>{
        el.parentElement.style.display =
            el.textContent.toLowerCase().includes(query) ? "block" : "none";
    });
});

loadRecentFiles();

document.addEventListener("keydown", (event)=>{
    if(event.ctrlKey && event.shiftKey && event.key === "P"){
        event.preventDefault();
        showCommandPalette();
    } else if(event.ctrlKey && event.shiftKey && event.key === "T"){
        event.preventDefault();
        commandRegistry.actions.reopenClosedTab();
    } else if(event.ctrlKey && event.shiftKey && event.key === "S"){
        event.preventDefault();
        commandRegistry.actions.saveAll();
    } else if(event.ctrlKey && event.key === "z" && !event.shiftKey){
        if(editor && editor.hasTextFocus()){
            event.preventDefault();
            commandRegistry.actions.undo();
        }
    } else if((event.ctrlKey && event.shiftKey && event.key === "Z") || (event.ctrlKey && event.key === "y")){
        if(editor && editor.hasTextFocus()){
            event.preventDefault();
            commandRegistry.actions.redo();
        }
    } else if(event.key === "Delete" && !pendingInlineEdit){
        // Delete selected tree item
        if(selectedTreePath){
            event.preventDefault();
            deletePath(selectedTreePath);
        }
    }
});

document.getElementById("command-palette").addEventListener("click", (event)=>{
    if(event.target.id === "command-palette"){
        hideCommandPalette();
    }
});

document.getElementById("palette-input").addEventListener("input", (event)=>{
    const filter = event.target.value;
    const items = document.getElementById("palette-items");
    populatePaletteItems(commandRegistry.commands, items, filter);
});

document.addEventListener("keydown", (event)=>{
    const palette = document.getElementById("command-palette");
    if(palette.style.display === "flex" && event.key === "Escape"){
        event.preventDefault();
        hideCommandPalette();
    }
});

document.getElementById("divider").addEventListener("mousedown", function(){
    document.onmousemove = function(e){
        const explorer = document.getElementById("explorer");
        const newWidth = e.clientX;
        
        if(newWidth < 50){
            // Hide explorer
            if(!explorerHidden){
                explorerHidden = true;
                explorer.classList.add("hidden");
                document.getElementById("divider").classList.add("explorer-hidden");
            }
        } else {
            // Show explorer
            if(explorerHidden){
                explorerHidden = false;
                explorer.classList.remove("hidden");
                document.getElementById("divider").classList.remove("explorer-hidden");
            }
            explorer.style.width = newWidth + "px";
        }
    };
    document.onmouseup = function(){
        document.onmousemove = null;
        
        // Allow clicking divider to toggle explorer if hidden
        if(explorerHidden){
            document.getElementById("divider").style.cursor = "pointer";
        }
    };
});

// Click divider to restore explorer when hidden
document.getElementById("divider").addEventListener("click", function(){
    if(explorerHidden){
        explorerHidden = false;
        const explorer = document.getElementById("explorer");
        explorer.classList.remove("hidden");
        document.getElementById("divider").classList.remove("explorer-hidden");
        explorer.style.width = "280px";
        this.style.cursor = "col-resize";
    }
});
</script>
