<!DOCTYPE html>
<html>
<head>
<title>Web IDE Login</title>
<link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; }
html, body {
    margin: 0;
    height: 100%;
    font-family: Segoe UI, Roboto, Arial, sans-serif;
    background: #1e1e1e;
    color: #d4d4d4;
}
body {
    display: flex;
    align-items: center;
    justify-content: center;
}
.login-card {
    width: min(420px, 92vw);
    background: #252526;
    border: 1px solid #3a3a3a;
    border-radius: 10px;
    padding: 20px;
}
h1 {
    margin: 0 0 14px;
    font-size: 18px;
    font-weight: 600;
}
p {
    margin: 0 0 14px;
    color: #bdbdbd;
    font-size: 13px;
}
label {
    display: block;
    margin-bottom: 8px;
    font-size: 12px;
    color: #c7c7c7;
}
input[type="password"] {
    width: 100%;
    border: 1px solid #3d3d3d;
    background: #111;
    color: #e5e5e5;
    border-radius: 6px;
    padding: 9px 10px;
    outline: none;
    font-size: 13px;
}
input[type="password"]:focus {
    border-color: #007acc;
}
button {
    margin-top: 12px;
    width: 100%;
    border: 1px solid #007acc;
    background: #007acc;
    color: #fff;
    border-radius: 6px;
    padding: 9px 10px;
    font-size: 13px;
    cursor: pointer;
}
button:hover {
    background: #1187d4;
}
.error {
    margin-top: 12px;
    color: #ff7b72;
    font-size: 12px;
}
</style>
</head>
<body>
    <form class="login-card" method="post" action="/login">
        <h1>Web IDE Login</h1>
        <p>Enter the shared password to access this editor.</p>

        <input type="hidden" name="next" value="{{ next_path }}">

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required autofocus>

        <button type="submit">Sign in</button>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
    </form>
</body>
</html>
